metadata:
  name: "Do not allow odb:* service prefix in IAM policies"
  id: "CHI_POLICY_SERVICE_001"
  category: "IAM"
  guideline: "The 'odb' service prefix must not be used in any IAM policy action."
definition:
  cond_type: "attribute"
  resource_types:
    - "AWS::IAM::Policy"
    - "AWS::IAM::ManagedPolicy"
    - "AWS::IAM::Role"
  attribute: "PolicyDocument.Statement[*].Action[*]"
  operator: "jsonpath_not_regex_match"   # ← jsonpath_ prefix activates wildcard traversal
  value: "^odb:.*create.*"    # ← .*  before create catches odb:*create*, odb:bulkCreate etc.